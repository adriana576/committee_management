<!DOCTYPE html>
<html>
<head>
  <title>Appointment Letter</title>
  <link rel="stylesheet" href="admin_style.css">
</head>
<body>

<div class="topbar">
  <h3>Staff</h3>
</div>

<div class="layout">
  <div class="sidebar">
    <h2>
    <img src="img/LogoUiTM.png" alt="UiTM Logo" class="logo">
    Committee Management System
  </h2>
    <a href="user_home.html">Home</a>
    <a class="active" href="appointment_letter.html">Appointment Letter</a>
    <a href="appointment_history.html">History</a>
    <a href="user_profile.html">Profile</a>

    <button class="logout-btn" onclick="logout()">LOG OUT</button>
  </div>

  <div class="content">
    <h1>Appointment Letter</h1>

    <div class="card">
      <pre id="letterText">Loading...</pre>

      <br>
      <button onclick="downloadPDF()">Download PDF</button>
      <button onclick="window.open(`/api/user/${userId}/certificate/pdf`)">Certificate</button>
    </div>
  </div>
</div>

<script>
const BASE_URL = "https://your-railway-app.up.railway.app";
const userId = localStorage.getItem('userId');

async function loadLetter() {
  const res = await fetch(`${BASE_URL}/api/user/${userId}/letter`);
  const data = await res.json();

  if (data.success) {
    document.getElementById('letterText').innerText = data.letter;
  } else {
    document.getElementById('letterText').innerText = data.message;
  }
}

function downloadPDF() {
  window.open(`/api/user/${userId}/letter/pdf`);
}

function logout() {
  localStorage.clear();
  window.location.href = 'login.html';
}

loadLetter();
</script>

</body>
</html>
