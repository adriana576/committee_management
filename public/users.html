<!DOCTYPE html>
<html>
<head>
  <title>View Users</title>
  <link rel="stylesheet" href="admin_style.css">
</head>
<body>

<div class="topbar">
  <h3>Admin</h3>
</div>

<div class="layout">
  <div class="sidebar">
    <h2>
      <img src="img/LogoUiTM.png" class="logo" width="60" alt="UiTM Logo">
      Committee Management System
    </h2>
    <a href="admin_home.html">Home</a>
    <a href="committees.html">Manage Committee</a>
    <a class="active" href="users.html">View Staff</a>
    <a href="view_user.html">Search</a>
    <a href="recommendation.html">Generate Recommendation</a>
    <button class="logout-btn" onclick="logout()">LOG OUT</button>
  </div>

  <div class="content">

    <div class="page-header">
      <div>
        <h1>Staff Management</h1>
        <p>View and manage all registered staff in the committee system.</p>
      </div>

      <button class="add-btn" onclick="window.location.href='add_staff.html'">
        + Add New Staff
      </button>
    </div>

    <div class="stats-grid">
      <div class="stat-card purple">
        <div class="icon">TS</div>
        <div>
          <h2 id="totalStaff">0</h2>
          <span>Total Staff</span>
        </div>
      </div>

      <div class="stat-card green">
        <div class="icon">AU</div>
        <div>
          <h2 id="activeStaff">0</h2>
          <span>Registered Users</span>
        </div>
      </div>

      <div class="stat-card blue">
        <div class="icon">DR</div>
        <div>
          <h2 id="departmentCount">0</h2>
          <span>Departments</span>
        </div>
      </div>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput"
        placeholder="Search staff by name or department..."
        onkeyup="searchUsers()">
    </div>

    <div class="user-cards" id="userCards"></div>

  </div>
</div>

<div id="staffModal" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">-</button>
    <h2>Staff Details</h2>

    <div class="modal-avatar" id="modalAvatar"></div>

    <p><b>Name:</b> <span id="modalName"></span></p>
    <p><b>Email:</b> <span id="modalEmail"></span></p>
    <p><b>Department:</b> <span id="modalDepartment"></span></p>
    <p><b>Phone:</b> <span id="modalPhone"></span></p>
  </div>
</div>

<script>
const BASE_URL = "https://committeemanagement.zarinaproject.my/";
let allUsers = [];

async function loadUsers() {
  const res = await fetch(`${BASE_URL}/api/users`);
  const data = await res.json();

  allUsers = data;

  document.getElementById("totalStaff").innerText = data.length;
  document.getElementById("activeStaff").innerText = data.length;

  const departments = [...new Set(data.map(x => x.department).filter(Boolean))];
  document.getElementById("departmentCount").innerText = departments.length;

  renderUserCards(data);
}

function renderUserCards(data) {
  const container = document.getElementById("userCards");
  container.innerHTML = "";

  data.forEach(item => {
    container.innerHTML += `
      <div class="modern-user-card">
        <div class="status-badge">Active</div>
        <img src="img/LogoUiTM.png" class="user-logo">

        <div class="avatar">
          ${item.name.charAt(0).toUpperCase()}
        </div>

        <h2>${item.name}</h2>
        <h4>${item.department ?? "-"}</h4>

        <div class="info">
          <p>Phone ${item.phone ?? "-"}</p>
          <p>Email ${item.email}</p>
        </div>

        <div class="actions">
          <button class="view-btn" onclick="viewUser(${item.id})">View</button>
          <button class="edit-btn" onclick="editUser(${item.id})">Edit</button>
          <button class="delete-btn" onclick="deleteUser(${item.id})">Delete</button>
        </div>
      </div>
    `;
  });
}

function viewUser(id) {
  const user = allUsers.find(u => u.id == id);

  document.getElementById("modalAvatar").innerText = user.name.charAt(0).toUpperCase();
  document.getElementById("modalName").innerText = user.name;
  document.getElementById("modalEmail").innerText = user.email;
  document.getElementById("modalDepartment").innerText = user.department || "-";
  document.getElementById("modalPhone").innerText = user.phone || "-";

  document.getElementById("staffModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("staffModal").style.display = "none";
}

function editUser(id) {
  window.location.href = `edit_staff.html?id=${id}`;
}

async function deleteUser(id) {
  if (!confirm("Are you sure you want to delete this staff?")) return;

  const res = await fetch(`${BASE_URL}/api/users/${id}`, {
    method: "DELETE"
  });

  const data = await res.json();

  if (data.success) {
    alert("Staff deleted successfully.");
    loadUsers();
  } else {
    alert(data.message || "Failed to delete staff.");
  }
}

function searchUsers() {
  const input = document.getElementById("searchInput").value.toLowerCase().trim();
  const cards = document.querySelectorAll(".modern-user-card");

  cards.forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(input) ? "" : "none";
  });
}

function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}

loadUsers();
</script>

</body>
</html>
