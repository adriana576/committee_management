<!DOCTYPE html>
<html>
<head>
  <title>Appointment History</title>
  <link rel="stylesheet" href="admin_style.css">
</head>
<body>

<div class="topbar">
  <h3>Staff</h3>
</div>

<div class="layout">
  <div class="sidebar">
    <h2>
    <img src="img/LogoUiTM.png" alt="UiTM Logo" class="logo">
    Committee Management System
  </h2>
    <a href="user_home.html">Home</a>
    <a href="appointment_letter.html">Appointment Letter</a>
    <a class="active" href="appointment_history.html">History</a>
    <a href="user_profile.html">Profile</a>

    <button class="logout-btn" onclick="logout()">LOG OUT</button>
  </div>

  <div class="content">
    <h1>Appointment History</h1>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Committee</th>
            <th>Role</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const BASE_URL = "https://committeemanagement.zarinaproject.my";
const userId = localStorage.getItem('userId');

async function loadHistory() {
  const res = await fetch(`${BASE_URL}/api/user/${userId}/appointments`);
  const data = await res.json();

  if (data.length === 0) {
    document.getElementById('historyTable').innerHTML = `
      <tr>
        <td colspan="5">No appointment history found</td>
      </tr>
    `;
    return;
  }

  document.getElementById('historyTable').innerHTML = data.map(item => `
    <tr>
      <td>${item.committee_name}</td>
      <td>${item.role}</td>
      <td>${formatDate(item.start_date)}</td>
      <td>${formatDate(item.end_date)}</td>
      <td>${getStatus(item.end_date)}</td>
    </tr>
  `).join('');
}

function formatDate(dateString) {
  const date = new Date(dateString);

  const day = date.getDate();
  const month = date.getMonth() + 1;
  const year = date.getFullYear();

  return `${day}/${month}/${year}`;
}

function getStatus(endDate) {
  const today = new Date();
  const end = new Date(endDate);

  if (end < today) {
    return '<span style="color:red;">Inactive</span>';
  } else {
    return '<span style="color:green;">Active</span>';
  }
}

function logout() {
  localStorage.clear();
  window.location.href = 'index.html';
}

loadHistory();
</script>

</body>
</html>
