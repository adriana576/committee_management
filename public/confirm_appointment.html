<!DOCTYPE html>
<html>
<head>
  <title>Confirm Appointment</title>
  <link rel="stylesheet" href="admin_style.css">
</head>
<body>

<div class="topbar">
  <h3>Admin</h3>
</div>

<div class="layout">
  <div class="sidebar">
    <h2>
    <img src="img/LogoUiTM.png" alt="UiTM Logo" class="logo">
    Committee Management System
  </h2>
    <a href="admin_home.html">Home</a>
    <a href="committees.html">Manage Committee</a>
    <a class="active" href="confirm_appointment.html">Finalize Appointment</a>
    <a href="users.html">Notify User</a>
    <a href="recommendation.html">Generate Recommendation</a>
    <button class="logout-btn" onclick="logout()">LOG OUT</button>
  </div>

  <div class="content">
    <h1>Confirm Appointment</h1>

    <div class="card">
      <p id="confirmText"></p>

      <label>Select Committee</label>
      <select id="committee_id"></select>

      <label>Role</label>
      <input type="text" id="role" value="Member">

      <label>Start Date</label>
      <input type="date" id="start_date">

      <label>End Date</label>
      <input type="date" id="end_date">

      <button onclick="confirmAppointment()">Confirm</button>
      <button onclick="window.location.href='recommendation.html'">Cancel</button>

      <p id="msg"></p>
    </div>
  </div>
</div>

<script>
  const BASE_URL = "https://zarinaproject.my";
  
  const selectedUserId = localStorage.getItem('selectedUserId');
  const selectedUserName = localStorage.getItem('selectedUserName');

  document.getElementById('confirmText').innerText =
    `Are you sure you want to appoint ${selectedUserName}?`;

  async function loadCommittees() {
    const res = await fetch(`${BASE_URL}/api/committees`);
    const data = await res.json();

    document.getElementById('committee_id').innerHTML = data.map(c => `
      <option value="${c.id}">${c.committee_name}</option>
    `).join('');
  }

  async function confirmAppointment() {
    const committee_id = document.getElementById('committee_id').value;
    const role = document.getElementById('role').value;
    const start_date = document.getElementById('start_date').value;
    const end_date = document.getElementById('end_date').value;

    const res = await fetch(`${BASE_URL}/api/appointments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: selectedUserId,
        committee_id,
        role,
        start_date,
        end_date,
        status: 'Active'
      })
    });

    const data = await res.json();
    document.getElementById('msg').innerText = data.message;

    if (data.success) {
      setTimeout(() => {
        window.location.href = 'assign_appointment.html';
      }, 1000);
    }
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
  }

  loadCommittees();
</script>

</body>
</html>
