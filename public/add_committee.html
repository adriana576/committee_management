<!DOCTYPE html>
<html>
<head>
  <title>Add Committee</title>
  <link rel="stylesheet" href="admin_style.css">
</head>
<body>

<div class="topbar">
  <h3>Admin</h3>
</div>

<div class="layout">
  <div class="sidebar">
    <h2>
    <img src="img/LogoUiTM.png" alt="UiTM Logo" class="logo">
    Committee Management System
  </h2>
    <a href="admin_home.html">Home</a>
    <a href="committees.html">Manage Committee</a>
    <a href="assign_appointment.html">Finalize Appointment</a>
    <a href="users.html">View Staff</a>
    <a href="export_report.html">Search</a>
    <a href="recommendation.html">Generate Recommendation</a>
    <button class="logout-btn" onclick="logout()">LOG OUT</button>
  </div>

  <div class="content">
    <h1>Add Committee</h1>

    <div class="card">
      <label>Committee Name</label>
      <input type="text" id="committee_name" placeholder="Enter committee name">

      <label>Faculty</label>
      <input type="text" id="faculty" placeholder="Enter faculty">

      <button onclick="addCommittee()">Save Committee</button>
      <p id="msg"></p>
    </div>
  </div>
</div>

<script>
  const BASE_URL = "https://your-railway-app.up.railway.app";
  
  async function addCommittee() {
  const committee_name = document.getElementById('committee_name').value;
  const faculty = document.getElementById('faculty').value;

  const res = await fetch(`${BASE_URL}/api/committees`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ committee_name, faculty })
  });

  const data = await res.json();
  console.log(data);

    if (data.success) {
      document.getElementById('committee_name').value = '';
      document.getElementById('faculty').value = '';
    }
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
  }
</script>

</body>
</html>
